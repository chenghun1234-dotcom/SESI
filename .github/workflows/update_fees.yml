name: Update Silver Care Fees

on:
  schedule:
    - cron: '0 18 1 * *' # 매달 1일 한국시간 오전 3시 (UTC 18:00)
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run SESI Engine
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: python main.py

      - name: Commit and Push Static API
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/api/sesi_index.json
          git commit -m "chore: update SESI index static API [skip ci]" || echo "No changes to commit"
          git push
